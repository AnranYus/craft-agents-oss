name: Build Release Installers

# A merge into `main` (i.e. a merged PR, under branch protection) builds the
# desktop installers for macOS (Apple Silicon), Windows (x64) and Linux (x64),
# uploads each as a run artifact, and publishes a GitHub prerelease with all three.
# Also runnable on demand via the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.title }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            title: macOS (Apple Silicon)
            build: bash apps/electron/scripts/build-dmg.sh arm64
            artifact: macos-arm64
            files: apps/electron/release/*.dmg
          - os: ubuntu-latest
            title: Linux (x64)
            build: bash apps/electron/scripts/build-linux.sh x64
            artifact: linux-x64
            files: apps/electron/release/*.AppImage
          - os: windows-latest
            title: Windows (x64)
            build: pwsh -File apps/electron/scripts/build-win.ps1
            artifact: windows-x64
            files: apps/electron/release/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # worker.cjs and the Pi/session server dists are gitignored but referenced by
      # electron-builder.yml extraResources, so they must exist before packaging.
      - name: Build bundled subprocess artifacts
        shell: bash
        run: |
          bun run build:wa-worker
          bun run server:build:subprocess

      - name: Build installer
        run: ${{ matrix.build }}
        env:
          # OAuth client IDs are baked in at build time when present (else disabled).
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          SLACK_OAUTH_CLIENT_ID: ${{ secrets.SLACK_OAUTH_CLIENT_ID }}
          SLACK_OAUTH_CLIENT_SECRET: ${{ secrets.SLACK_OAUTH_CLIENT_SECRET }}
          MICROSOFT_OAUTH_CLIENT_ID: ${{ secrets.MICROSOFT_OAUTH_CLIENT_ID }}
          # macOS signing via keychain identity (build-dmg.sh guards these when unset).
          # CSC_LINK/CSC_KEY_PASSWORD are deliberately omitted: an empty secret is read
          # by electron-builder as a real cert path and crashes ("<projectDir> not a file").
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: craft-agents-${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  release:
    name: Publish prerelease
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: installers

      - name: Read app version
        id: ver
        run: echo "version=$(node -p "require('./apps/electron/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}-build.${{ github.run_number }}
          name: Craft Agents v${{ steps.ver.outputs.version }} (build ${{ github.run_number }})
          prerelease: true
          body: |
            Automated build from ${{ github.sha }}.

            Installers are **unsigned** unless signing secrets are configured — macOS
            Gatekeeper and Windows SmartScreen will warn on first launch.

            | Platform | File |
            | --- | --- |
            | macOS (Apple Silicon) | `Craft-Agents-arm64.dmg` |
            | Windows (x64) | `Craft-Agents-x64.exe` |
            | Linux (x64) | `Craft-Agents-x64.AppImage` |
          files: |
            installers/**/*.dmg
            installers/**/*.exe
            installers/**/*.AppImage
          fail_on_unmatched_files: true
